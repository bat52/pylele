name: TestUbuntuBlender

on: [push]

jobs:
  build:
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        # https://github.com/actions/setup-python/issues/853
        python-version: ["3.11"]
        os: [ubuntu-latest] #, ubuntu-24.04, ubuntu-22.04] # latest and LTS
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    # python packages included in install_dependencies
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements_bpy.txt
    - name: install dependencies
      run: |
        chmod +x ./install_dependencies.sh
        sudo ./install_dependencies.sh
    - name: pip configuration report
      run: |
        mkdir test
        pip list > ./test/pip_list.txt
    - name: Generate timestamp
      id: timestamp
      run: echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV
    - name: test_b13d
      run: |
        # export OMP_NUM_THREADS=1
        # export OPENBLAS_NUM_THREADS=1
        # export MKL_NUM_THREADS=1
        # export NUMEXPR_NUM_THREADS=1
        pytest -n 2 ./src/b13d/test.py
      continue-on-error: true
    - name: test_b1scad
      run: |
        pytest -n 2 ./src/b1scad/test.py
      continue-on-error: true 
    - name: test_pylele
      run: |
        pytest -n 2 ./src/pylele/test.py
      continue-on-error: true
    - name: upload test output
      uses: actions/upload-artifact@v4
      with:
          # path depends on the tag and the module name
          name: pylele_test_out_bpy_${{ matrix.python-version }}_${{ matrix.os }}_${{ env.timestamp }}
          path: test/**/**/**/* #find ./test/fretboard_assembly/blender/*
   - name: test pylele2.sh
      run: |
        source ./src/pylele2.sh -odoff -i bpy
      continue-on-error: true
    - name: upload demo stl
      uses: actions/upload-artifact@v4
      with:
          # path depends on the tag and the module name
          name: pylele_stl_out_bpy_${{ matrix.python-version }}_${{ matrix.os }}_${{ env.timestamp }}
          path: build/LeleAllAssembly/LeleAllAssembly.stl
          # compression-level: 0 # no compression

